# CI mínimo — Resource-Aware (só quality; sem matrix/deploy)
name: CI

on:
  push:
    branches: [main, sandbox]
  pull_request:
    branches: [main, sandbox]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
